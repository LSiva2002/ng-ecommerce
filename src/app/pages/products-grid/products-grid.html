<mat-sidenav-container>
    <mat-sidenav mode="side" opened="true">
        <div class="p-6">
            <h2 class="text-lg font-bold text-gray-900">Categories</h2>

            <mat-nav-list>
                @for (cat of categories(); track cat){
                <mat-list-item [activated]="cat === category()" class="my-2" [routerLink]="['/products', cat]">
                    <span matLine>{{cat|titlecase}}</span>
                </mat-list-item>
                }
            </mat-nav-list>
        </div>
    </mat-sidenav>

    <mat-sidenav-content class="bg-gray-100 p-6 h-full">
        <div class="bg-gray-100 p-6">
            <h1 class="text-2xl font-bold text-grey-900">{{category()|titlecase}}</h1>
        </div>
        <div class="responsive-grid p-5">
            @for (product of filteredProducts(); track product.id){
            <app-product-card [product]="product"></app-product-card>
            }
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
