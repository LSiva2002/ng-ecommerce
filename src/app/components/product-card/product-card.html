<div class="bg-white cursor-pointer rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
    <img [src]="product().image" class="w-full h-[300px] object-cover rounded-t-xl ">

    <div class="p-5 flex flex-col flex-1">
        <h3 class="text-lg font-semibold text-gray-900 mb-2 leading-tight">{{product().name}}</h3>
        <p class="text-gray-600 mb-4 flex-1">{{product().description}}</p>
        <div class="flex items-center justify-between mb-4">
            <p class="text-green-500">{{product().inStock ? 'In Stock' : 'Out of Stock'}}</p>
            <span class="text-2xl font-bold text-gray-900">₹{{product().price}}</span>
            <div class="flex items-center">
                <span class="text-yellow-500">★</span>
                <span class="text-gray-600 ml-1">{{product().rating}}</span>
                <span class="text-gray-500 ml-2">({{product().reviewCount}})</span>
            </div>
        </div>
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors">
            Add to Cart
        </button>
    </div>
</div>
